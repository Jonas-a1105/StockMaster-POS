version: '3.8'

services:
  # 1. Base de Datos PostgreSQL Central
  postgres:
    image: postgres:15-alpine
    container_name: stockmaster_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockmaster_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockmaster_secure_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-stockmaster_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockmaster_admin} -d ${POSTGRES_DB:-stockmaster_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockmaster_network

  # 2. Servidor Backend NestJS (Fastify + Prisma ORM)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stockmaster_backend
    restart: always
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-stockmaster_admin}:${POSTGRES_PASSWORD:-stockmaster_secure_password_2026}@postgres:5432/${POSTGRES_DB:-stockmaster_db}
      JWT_SECRET: ${JWT_SECRET:-super_secure_token_secret_jwt_2026_stockmasterpro}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockmaster_network

  # 3. PWA Cliente + Servidor Nginx (Alto Rendimiento y Seguridad)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: stockmaster_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stockmaster_network

volumes:
  postgres_data:
    driver: local

networks:
  stockmaster_network:
    driver: bridge
