version: '3.8'

services:
  # 1. Servidor Backend NestJS (Fastify + Prisma ORM + SQLite)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stockmaster_backend
    restart: always
    environment:
      PORT: 3000
      DATABASE_URL: "file:./prisma/dev.db"
      JWT_SECRET: ${JWT_SECRET:-cambiar_esta_clave_secreta_en_produccion}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/prisma

  # 2. PWA Cliente + Servidor Nginx (Alto Rendimiento y Seguridad)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: stockmaster_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
